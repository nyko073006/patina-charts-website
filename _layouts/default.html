<!doctype html>
<html lang="{{ site.lang | default: 'de' }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0E1622" media="(prefers-color-scheme: dark)">
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:type" content="website">
<meta property="og:url" content="https://patinacharts.de{{ page.url }}">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="{% if page.home %}home{% else %}page{% endif %}">

<header class="site-header">
  <div class="site-header-inner">
    <a href="{{ '/' | relative_url }}" class="brand">Patina&nbsp;Charts</a>
    <nav class="primary-nav">
      <a href="{{ '/' | relative_url }}#funktionen">Funktionen</a>
      <a href="{{ '/' | relative_url }}#preise">Preise</a>
      <a href="{{ '/' | relative_url }}#faq">FAQ</a>
    </nav>
    <a href="{{ site.download_url }}" class="nav-cta">{{ site.download_label }}</a>
  </div>
</header>

<main>
  {{ content }}
</main>

<footer class="site-footer">
  <div class="site-footer-inner">
    <div class="footer-col">
      <div class="footer-brand">Patina&nbsp;Charts</div>
      <p class="footer-tag">ETF gegen Fondspolice — entschieden im Termin.</p>
    </div>
    <div class="footer-col">
      <div class="footer-h">Produkt</div>
      <a href="{{ '/' | relative_url }}#funktionen">Funktionen</a>
      <a href="{{ '/' | relative_url }}#preise">Preise</a>
      <a href="{{ '/' | relative_url }}#faq">FAQ</a>
    </div>
    <div class="footer-col">
      <div class="footer-h">Rechtliches</div>
      <a href="{{ '/impressum/' | relative_url }}">Impressum</a>
      <a href="{{ '/privacy/' | relative_url }}">Datenschutz</a>
      <a href="{{ '/support/' | relative_url }}">Support</a>
    </div>
  </div>
  <div class="site-footer-base">
    © {{ 'now' | date: '%Y' }} Niklas Humplik · Patina Charts
  </div>
</footer>

</body>
</html>
