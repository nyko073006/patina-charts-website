- q: 'Funktioniert die App ohne Internet?'
  a: 'Patina Charts funktioniert im Beratungstermin größtenteils offline. Die Mandantenverwaltung, alle Nachsteuer-Berechnungen für den ETF-vs-Fondspolice-Vergleich und der Export der Beratungsdokumentation als PDF laufen vollständig lokal auf dem iPad — ohne aktive Internetverbindung. So bleibst du auch in Räumen ohne stabiles WLAN oder Mobilfunk arbeitsfähig, etwa beim Mandanten vor Ort. Eine Verbindung wird nur an zwei Stellen benötigt: beim einmaligen Login bzw. der Lizenzaktivierung und beim Aktualisieren der Tarifdatenbank, damit die hinterlegten Produktwerte aktuell bleiben. Beide Vorgänge lassen sich vorab erledigen, sodass der eigentliche Termin unabhängig von der Netzabdeckung bleibt. Die Mandantendaten selbst verlassen das Gerät dabei nicht.'

- q: 'Werden Mandanten-Daten in die Cloud synchronisiert?'
  a: 'Standardmäßig nicht. Mandanten liegen lokal via SwiftData auf dem iPad. Optional kannst du Team-Sync via Supabase aktivieren — dann werden Mandanten verschlüsselt zwischen mehreren Beratern eines Accounts geteilt.'

- q: 'Wie aktuell sind die Tarif-Werte?'
  a: 'Patina Charts pflegt die Tarifdatenbank aus öffentlich zugänglichen Produktinformationsblättern (PIB) der Anbieter und aktualisiert sie regelmäßig. Damit liefert der Vergleich plausible, aktuelle Branchen-Größenordnungen für das Gespräch im Termin. Wichtig für die Beratungspraxis: Für die verbindliche Empfehlung sind immer die Werte aus dem aktuellen PIB sowie dem Basisinformationsblatt (PRIIP-KID) des jeweiligen Anbieters maßgeblich — Patina Charts ersetzt diese Unterlagen nicht, sondern macht die steuerlichen Größenordnungen (Halbeinkünfteverfahren, Vorabpauschale, Teilfreistellung, Kosten) beidseitig sichtbar. So zeigst du im Termin schnell eine belastbare Gegenüberstellung und schließt die endgültige Berechnung anschließend mit den offiziellen Anbieterdokumenten ab.'

- q: 'Kann ich eigene Tarife hinzufügen?'
  a: 'Im Professional-Tier kannst du Tarife per JSON-Import hinzufügen. Für eigene Datenbank-Branches mit privaten Tarifen gibt es ein Enterprise-Setup auf Anfrage.'

- q: 'Gibt es eine Android- oder Web-Version?'
  a: 'Aktuell iPad-only. Die App nutzt nativ iPadOS-Features (Apple Pencil, EventKit, StoreKit) und ist für die Beratung im persönlichen Termin optimiert. Eine iPhone-Version ist in Planung, eine Web-Version nicht.'

- q: 'Wie aktiviere ich meine Lizenz nach dem Kauf?'
  a: 'Nach der Zahlung erhältst du eine E-Mail mit deinem Aktivierungscode. Diesen gibst du in der App unter „Lizenz aktivieren" zusammen mit deiner E-Mail-Adresse ein. Sofort freigeschaltet, kein Cloud-Login nötig.'

- q: 'Welche Rechtsgrundlage hat die App? Ist sie IDD-konform?'
  a: 'Patina Charts ist eine Berechnungs- und Visualisierungssoftware — keine Anlage-, Steuer- oder Versicherungsberatung. Die erzeugten Vergleiche sind unverbindliche Modellrechnungen, die als Anlage zu deiner eigenen Beratung dienen. Der Nutzen für die IDD-Praxis liegt in der Dokumentation: Die Protokoll-PDFs sind so strukturiert, dass sie als Nachweis gemäß den IDD-Beratungspflichten (§ 61 VVG) verwendet werden können — inklusive Empfehlungsbegründung, der betrachteten Alternative (ETF-Sparplan) und Hinweisen auf Beschwerdewege. Die fachliche und rechtliche Verantwortung für die Empfehlung bleibt bei dir als Vermittler; maßgeblich sind die verbindlichen Anbieterunterlagen (PIB, PRIIP-KID, Bedingungen). Patina Charts liefert die nachvollziehbare, dokumentierte Entscheidungsgrundlage — nicht die Beratung selbst.'

- q: 'Wie kündige ich mein Abo?'
  a: 'Dein Patina-Charts-Abo verwaltest du über deine Apple-ID, da die Abrechnung über den App Store läuft: <em>iPhone/iPad → Einstellungen → [dein Name] → Abonnements → Patina Charts → Abo beenden</em>. Die Kündigung ist jederzeit zum Ende der laufenden Abrechnungsperiode möglich. Kündigst du innerhalb der ersten vierzehn Tage der kostenlosen Testphase, entstehen keine Kosten. Nach Ablauf des Abos wechselt Patina Charts in einen Read-Only-Modus: Deine Mandantendaten und bisherigen Vergleiche bleiben auf dem Gerät erhalten, du kannst sie weiter einsehen und das Abo jederzeit reaktivieren, um wieder neue Berechnungen und PDF-Exports zu erstellen.'

- q: 'Bietet ihr Schulungen für Geschäftsstellen?'
  a: 'Für Geschäftsstellen mit fünf oder mehr Beratern bieten wir kostenlose 60-Minuten-Onboarding-Calls an. Schreib uns kurz an <a href="mailto:nyko@patinasouthside.de?subject=Onboarding-Call%20Geschäftsstelle">nyko@patinasouthside.de</a>.'
